<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melih Yavuk | 4. Hafta Portfolyosu</title>
    <style>
        :root {
            --accent: #00d2ff;
            --card-bg: rgba(22, 27, 34, 0.9);
            --border: #30363d;
            --text-main: #f0f6fc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
            background: linear-gradient(-45deg, #0d1117, #161b22, #001f3f, #0d1117);
            background-size: 400% 400%;
            transition: background 0.1s ease;
            overflow-x: hidden;
        }

        .container { max-width: 900px; width: 90%; margin: 50px auto; }

        header {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            margin-bottom: 30px;
        }

        .profile-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 15px var(--accent);
            object-fit: cover;
            transition: 0.4s;
        }

        h1 { margin: 15px 0 5px; font-size: 2.5rem; }
        .app-tag { color: var(--accent); font-weight: bold; letter-spacing: 2px; }

        .show-btn {
            background: #238636;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 0 15px rgba(35, 134, 54, 0.4);
            position: relative;
            overflow: hidden;
        }

        .show-btn::after {
            content: ''; position: absolute; top: -50%; left: -60%;
            width: 20%; height: 200%; background: rgba(255,255,255,0.2);
            transform: rotate(30deg); transition: 0.5s;
        }
        .show-btn:hover::after { left: 120%; }

        /* İçerik Alanı */
        #content-area {
            display: none; /* JS ile açılacak */
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-align: center; }
        
        .chart-img {
            max-width: 100%; border-radius: 10px; border: 2px solid var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        .table-wrapper {
            margin-top: 30px; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 15px; padding: 20px; overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background: #161b22; color: var(--accent); }

        footer { text-align: center; margin-top: 50px; opacity: 0.5; padding-bottom: 20px; }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="WhatsApp Image 2026-04-01 at 11.55.53.jpeg" alt="Melih Yavuk" class="profile-img">
            <h1>Melih Yavuk</h1>
            <div class="app-tag">Uygulama: Ev Hazırlığı</div>
            
            <button class="show-btn" onclick="toggleDisplay()">🚀 VERİLERİ VE GRAFİĞİ GÖSTER</button>
        </header>

        <div id="content-area">
            <div class="grid">
                <div class="card">
                    <h3>Proje Grafiği</h3>
                    <img src="grafik.png" alt="Grafik" class="chart-img">
                </div>
                <div class="card">
                    <h3>Detaylar</h3>
                    <p>4. Hafta projesi kapsamında hazırlanan veriler ve görsel analizler yandadır.</p>
                </div>
            </div>

            <div class="table-wrapper">
                <h3>Veri Seti (CSV)</h3>
                <div id="table-output">Yükleniyor...</div>
            </div>
        </div>

        <footer>© 2026 Melih Yavuk</footer>
    </div>

    <script>
        // Mause Hareketi (Mekik Efekti)
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX / window.innerWidth - 0.5) * 5;
            const moveY = (e.clientY / window.innerHeight - 0.5) * 5;
            document.body.style.backgroundPosition = `${50 + moveX}% ${50 + moveY}%`;
        });

        // Buton Fonksiyonu
        function toggleDisplay() {
            const area = document.getElementById('content-area');
            area.style.display = 'block';
            area.scrollIntoView({ behavior: 'smooth' });

            // CSV Verisini Çekme
            fetch('veri.csv')
                .then(res => {
                    if(!res.ok) throw new Error("Dosya bulunamadı");
                    return res.text();
                })
                .then(text => {
                    const rows = text.trim().split('\n');
                    let html = '<table>';
                    rows.forEach((row, i) => {
                        const cols = row.split(',');
                        html += '<tr>';
                        cols.forEach(col => {
                            html += i === 0 ? `<th>${col}</th>` : `<td>${col}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</table>';
                    document.getElementById('table-output').innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('table-output').innerHTML = "Veri dosyası (veri.csv) okunamadı. Lütfen GitHub'da dosyanın mevcut olduğundan emin olun.";
                });
        }
    </script>
</body>
</html>
