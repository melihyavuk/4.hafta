<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melih Yavuk | 4. Hafta Proje Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #00d2ff;
            --github-color: #6e5494;
            --game-color: #f39c12;
            --data-color: #238636;
            --card-bg: rgba(22, 27, 34, 0.95);
            --border: #30363d;
            --text-main: #f0f6fc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
            background: radial-gradient(circle at center, #1c2531 0%, #0d1117 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            transition: background 0.1s ease;
        }

        .container { max-width: 1000px; width: 90%; margin: 50px auto; z-index: 2; position: relative; }

        header {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            margin-bottom: 30px;
        }

        .profile-img {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px var(--accent);
            object-fit: cover;
            transition: 0.4s;
        }

        .profile-img:hover { transform: scale(1.1) rotate(5deg); }

        /* Buton Grubu Stilleri */
        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .action-btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        /* Farklı Buton Renkleri */
        .btn-github { background: var(--github-color); box-shadow: 0 4px 15px rgba(110, 84, 148, 0.4); }
        .btn-game { background: var(--game-color); box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4); }
        .btn-data { background: var(--data-color); box-shadow: 0 4px 15px rgba(35, 134, 54, 0.4); }

        .action-btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        /* İçerik Panelleri */
        .content-panel {
            display: none; /* Başlangıçta gizli */
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chart-container { height: 350px; width: 100%; margin-top: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; font-size: 0.9rem; }
        th { background: #161b22; color: var(--accent); }

        footer { text-align: center; margin-top: 50px; opacity: 0.4; padding-bottom: 30px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="WhatsApp Image 2026-04-01 at 11.55.53.jpeg" alt="Melih Yavuk" class="profile-img">
            <h1>Melih Yavuk</h1>
            <p class="app-tag">Proje Kontrol Merkezi</p>
            
            <div class="button-group">
                <a href="https://github.com/melihyavuk" target="_blank" class="action-btn btn-github">
                    🐙 GitHub Profilim
                </a>
                
                <button onclick="showPanel('game-panel')" class="action-btn btn-game">
                    🎮 Ev Hazırlığı Oyunu
                </button>
                
                <button onclick="showPanel('data-panel')" class="action-btn btn-data">
                    📊 Veri & Grafikler
                </button>
            </div>
        </header>

        <div id="game-panel" class="content-panel">
            <h2>🏠 Ev Hazırlığı Oyunu</h2>
            <p>Oyun dosyasına gitmek veya oyunu başlatmak için aşağıdaki bağlantıyı kullanabilirsiniz:</p>
            <a href="ev-hazirligi.html" class="action-btn btn-game" style="width: fit-content;">Oyunu Başlat ➔</a>
        </div>

        <div id="data-panel" class="content-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                <h2>📊 Veri Analiz Raporu</h2>
                <button onclick="closePanels()" style="background:none; border:none; color:red; cursor:pointer;">[Kapat]</button>
            </div>
            
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>

            <div style="margin-top: 30px; overflow-x: auto;">
                <h3>Ham Veri Listesi (CSV)</h3>
                <div id="table-output">Yükleniyor...</div>
            </div>
        </div>

        <footer>© 2026 Melih Yavuk | Proje Portfolyosu</footer>
    </div>

    <script>
        // MEKİK EFEKTİ (Arka plan takibi)
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.body.style.background = `radial-gradient(circle at ${x}% ${y}%, #1c2531 0%, #0d1117 100%)`;
        });

        // PANEL GÖSTERME FONKSİYONU
        function showPanel(panelId) {
            // Önce tüm panelleri kapat
            closePanels();
            // İstenen paneli aç
            const target = document.getElementById(panelId);
            target.style.display = 'block';
            target.scrollIntoView({ behavior: 'smooth' });

            // Eğer veri paneli açıldıysa CSV'yi çek
            if(panelId === 'data-panel') {
                loadCSVData();
            }
        }

        function closePanels() {
            document.querySelectorAll('.content-panel').forEach(p => p.style.display = 'none');
        }
