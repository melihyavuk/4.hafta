<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melih Yavuk | Portfolio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --card-bg: #161b22;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100-vh;
            text-align: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
            margin: 20px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            object-fit: cover;
            margin-bottom: 1rem;
            background-color: #21262d;
        }

        h1 {
            margin: 0.5rem 0;
            color: white;
            font-size: 1.8rem;
        }

        p {
            color: #8b949e;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #2ea043;
        }

        .links {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .links a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="profil.jpg" alt="Melih Yavuk" class="profile-img">
        
        <h1>Melih Yavuk</h1>
        <p>Minecraft Mod Geliştiricisi & Tasarımcı</p>
        
        <a href="https://github.com/melihyavuk" class="btn">GitHub'da Takip Et</a>

        <div class="links">
            <a href="#">Projeler</a>
            <a href="#">İletişim</a>
            <a href="#">Hakkımda</a>
        </div>
    </div>

</body>
</html>
