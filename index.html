<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melih Yavuk | 4. Hafta Portfolyosu</title>
    <style>
        :root {
            --accent: #00d2ff;
            --card-bg: rgba(22, 27, 34, 0.95);
            --border: #30363d;
            --text-main: #f0f6fc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
            /* Mekik/Enerji Efekti Arka Planı */
            background: radial-gradient(circle at center, #1c2531 0%, #0d1117 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            transition: background 0.1s ease;
        }

        .container { max-width: 900px; width: 90%; margin: 50px auto; z-index: 2; position: relative; }

        header {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            margin-bottom: 30px;
        }

        .profile-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px var(--accent);
            object-fit: cover;
            transition: 0.4s;
        }

        .profile-img:hover { transform: scale(1.1); }

        h1 { margin: 15px 0 5px; font-size: 2.5rem; }
        .app-tag { color: var(--accent); font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        .show-btn {
            background: #238636;
            color: white;
            padding: 18px 35px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 0 20px rgba(35, 134, 54, 0.4);
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .show-btn:hover { transform: scale(1.05); background: #2ea043; }
        .show-btn::after {
            content: ''; position: absolute; top: -50%; left: -60%;
            width: 20%; height: 200%; background: rgba(255,255,255,0.2);
            transform: rotate(30deg); transition: 0.5s;
        }
        .show-btn:hover::after { left: 120%; }

        /* İçerik Alanı */
        #content-area {
            display: none;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 25px; text-align: center; }
        
        .chart-img {
            max-width: 100%; border-radius: 10px; border: 2px solid var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        .table-wrapper {
            margin-top: 30px; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 15px; padding: 20px; overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background: #161b22; color: var(--accent); }

        footer { text-align: center; margin-top: 50px; opacity: 0.5; padding-bottom: 30px; }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="WhatsApp Image 2026-04-01 at 11.55.53.jpeg" alt="Melih Yavuk" class="profile-img">
            <h1>Melih Yavuk</h1>
            <div class="app-tag">Uygulama: Ev Hazırlığı</div>
            
            <button class="show-btn" onclick="runApp()">🚀 ANALİZİ VE VERİLERİ BAŞLAT</button>
        </header>

        <div id="content-area">
            <div class="grid">
                <div class="card">
                    <h3>Grafik Sonucu</h3>
                    <img src="grafik.png" alt="Grafik yükleniyor..." class="chart-img">
                </div>
                <div class="card">
                    <h3>Proje Hakkında</h3>
                    <p>4. Hafta kapsamında hazırlanan bu çalışmada veriler <strong>vori.csv</strong> dosyasından çekilmektedir.</p>
                </div>
            </div>

            <div class="table-wrapper">
                <h3>Ham Veri Seti</h3>
                <div id="table-output">Veriler işleniyor...</div>
            </div>
        </div>

        <footer>© 2026 Melih Yavuk | GitHub Pages</footer>
    </div>

    <script>
        // MAUSE TAKİP (MEKİK EFEKTİ)
        document.addEventListener('mousemove', (e) => {
            const xPercent = (e.clientX / window.innerWidth) * 100;
            const yPercent = (e.clientY / window.innerHeight) * 100;
            document.body.style.background = `radial-gradient(circle at ${xPercent}% ${yPercent}%, #1c2531 0%, #0d1117 100%)`;
        });

        // VERİLERİ VE GRAFİĞİ AÇAN FONKSİYON
        function runApp() {
            const area = document.getElementById('content-area');
            area.style.display = 'block';
            area.scrollIntoView({ behavior: 'smooth' });

            // ÖNEMLİ: Senin dosya adın 'vori.csv' olduğu için burayı ona göre düzelttim
            fetch('vori.csv')
                .then(response => {
                    if (!response.ok) throw new Error('Dosya bulunamadı');
                    return response.text();
                })
                .then(csvText => {
                    const rows = csvText.trim().split('\n');
                    let tableHtml = '<table>';
                    rows.forEach((row, index) => {
                        const columns = row.split(',');
                        tableHtml += '<tr>';
                        columns.forEach(col => {
                            tableHtml += (index === 0) ? `<th>${col}</th>` : `<td>${col}</td>`;
                        });
                        tableHtml += '</tr>';
                    });
                    tableHtml += '</table>';
                    document.getElementById('table-output').innerHTML = tableHtml;
                })
                .catch(error => {
                    document.getElementById('table-output').innerHTML = 
                        "<span style='color:red;'>Hata: vori.csv dosyası okunamadı. Lütfen GitHub deponuzda dosya adının 'vori.csv' olduğundan emin olun.</span>";
                });
        }
    </script>
</body>
</html>
