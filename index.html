<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melih Yavuk | Uzay Portfolyo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #00d2ff;
            --card-bg: rgba(13, 17, 23, 0.9);
            --border: rgba(48, 54, 61, 1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif; color: white;
            background: #05080a; overflow-x: hidden;
        }

        /* Uzay Arka Planı */
        #space-canvas { position: fixed; top: 0; left: 0; z-index: 0; }

        .container {
            position: relative; z-index: 2; max-width: 900px;
            margin: 50px auto; padding: 20px;
        }

        header {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 25px; padding: 40px; text-align: center;
            backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .profile-img {
            width: 130px; height: 130px; border-radius: 50%;
            border: 3px solid var(--accent); box-shadow: 0 0 20px var(--accent);
            margin-bottom: 15px;
        }

        .btn-group {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; margin-top: 30px;
        }

        .btn {
            padding: 15px; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; color: white;
            transition: 0.3s; text-decoration: none; text-align: center;
        }

        .btn-github { background: #6e5494; }
        .btn-game { background: #f39c12; }
        .btn-data { background: #238636; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .panel {
            display: none; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 20px; padding: 25px; margin-top: 25px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .chart-box { height: 300px; width: 100%; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        th { color: var(--accent); background: #161b22; }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <div class="container">
        <header>
            <img src="WhatsApp Image 2026-04-01 at 11.55.53.jpeg" alt="Melih Yavuk" class="profile-img">
            <h1>Melih Yavuk</h1>
            <p style="color: var(--accent);">UZAY SİSTEMİ VERİ MERKEZİ</p>

            <div class="btn-group">
                <a href="https://github.com/melihyavuk" target="_blank" class="btn btn-github">🐙 GitHub Profil</a>
                <button onclick="togglePanel('game-panel')" class="btn btn-game">🎮 Ev Hazırlığı Oyunu</button>
                <button onclick="initDataSystem()" class="btn btn-data">📊 Veri & Grafikler</button>
            </div>
        </header>

        <div id="game-panel" class="panel">
            <h2>🏠 Ev Hazırlığı Projesi</h2>
            <p>Proje dosyasına ulaşmak için tıklayın:</p>
            <a href="ev-hazirligi.html" class="btn btn-game" style="display:inline-block">Oyunu Başlat</a>
        </div>

        <div id="data-panel" class="panel">
            <h2>📊 Analiz Sonuçları</h2>
            <div class="chart-box">
                <canvas id="myChart"></canvas>
            </div>
            <div id="table-output" style="overflow-x: auto;"></div>
        </div>
    </div>

    <script>
        // --- GEOMETRİK UZAY ARKA PLANI ---
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let shapes = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Shape {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 15 + 5;
                this.vX = (Math.random() - 0.5) * 0.5;
                this.vY = (Math.random() - 0.5) * 0.5;
                this.type = Math.floor(Math.random() * 3);
            }
            draw() {
                ctx.strokeStyle = "rgba(0, 210, 255, 0.3)";
                ctx.beginPath();
                if(this.type === 0) ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                else if(this.type === 1) ctx.rect(this.x, this.y, this.size, this.size);
                else { ctx.moveTo(this.x, this.y); ctx.lineTo(this.x+this.size, this.y+this.size); ctx.lineTo(this.x-this.size, this.y+this.size); ctx.closePath(); }
                ctx.stroke();
                this.x += this.vX; this.y += this.vY;
                if(this.x<0 || this.x>canvas.width || this.y<0 || this.y>canvas.height) this.init();
            }
        }
        for(let i=0; i<30; i++) shapes.push(new Shape());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); shapes.forEach(s=>s.draw()); requestAnimationFrame(animate); }
        animate();

        // --- VERİ SİSTEMİ ---
        function togglePanel(id) {
            document.querySelectorAll('.panel').forEach(p=>p.style.display='none');
            document.getElementById(id).style.display='block';
        }

        async function initDataSystem() {
            togglePanel('data-panel');
            
            // CSV Verisi (Buradaki veriyi kendi verilerine göre değiştirebilirsin)
            let rawData = "Kategori,Deger\nMutfak,85\nSalon,92\nBanyo,70\nBahce,60\nAntre,45";

            // Önce dosyadan çekmeyi dene
            try {
                const res = await fetch('vori.csv');
                if (res.ok) rawData = await res.text();
            } catch(e) { console.log("Dosya bulunamadı, yedek veri yükleniyor."); }

            const rows = rawData.trim().split('\n');
            const labels = [];
            const values = [];
            let table = '<table>';

            rows.forEach((r, i) => {
                const cols = r.split(',');
                table += '<tr>' + cols.map(c => i === 0 ? `<th>${c}</th>` : `<td>${c}</td>`).join('') + '</tr>';
                if (i > 0 && cols.length > 1) {
                    labels.push(cols[0]);
                    values.push(parseFloat(cols[1]) || 0);
                }
            });

            document.getElementById('table-output').innerHTML = table + '</table>';

            const ctxChart = document.getElementById('myChart').getContext('2d');
            if (window.chart) window.chart.destroy();
            window.chart = new Chart(ctxChart, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Hazırlık Puanı',
                        data: values,
                        backgroundColor: 'rgba(0, 210, 255, 0.5)',
                        borderColor: '#00d2ff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, ticks: {color: '#fff'} }, x: { ticks: {color: '#fff'} } }
                }
            });
        }
    </script>
</body>
</html>
